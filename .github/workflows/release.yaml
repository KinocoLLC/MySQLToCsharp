name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*" # only tag

jobs:
  build-dotnet:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          dotnet-version: |
            8.0.x
      - run: dotnet build -c Release -p:Version=${{ github.ref_name }}
      - run: dotnet pack -c Release -p:Version=${{ github.ref_name }} -o ./pack
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nuget
          path: ./pack/
      # publish
      - run: dotnet publish ./src/MySQLToCsharp/ -c Release -o ./publish -r win-x64 -p:PublishSingleFile=true -p:Version=${{ github.ref_name }}
      - run: dotnet publish ./src/MySQLToCsharp/ -c Release -o ./publish -r linux-x64 -p:PublishSingleFile=true -p:Version=${{ github.ref_name }}
      - run: dotnet publish ./src/MySQLToCsharp/ -c Release -o ./publish -r osx-x64 -p:PublishSingleFile=true -p:Version=${{ github.ref_name }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: publish
          path: ./publish/
          retention-days: 1
          if-no-files-found: error

  create-release:
    needs: [build-dotnet]
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: NuGet Login
        uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544 # v1.1.0
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: nuget
          path: ./nuget
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: publish
          path: ./publish
      - uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          dotnet-version: |
            8.0.x
      # Create Release
      - name: Create Release
        shell: bash
        run: gh release create "${TAG}" --title "${TITLE}" --generate-notes --draft
        env:
          TAG: ${{ github.ref_name }}
          TITLE: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Release Asset (Windows)
        run: gh release upload "${{ github.ref_name }}" MySQLToCsharp_win-x64_${{ github.ref_name }}.exe --clobber
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: publish/
      - name: Upload Release Asset (Linux)
        run: gh release upload "${{ github.ref_name }}" MySQLToCsharp_linux-x64_${{ github.ref_name }} --clobber
        working-directory: publish/
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Release Asset (macOS)
        run: gh release upload "${{ github.ref_name }}" MySQLToCsharp_osx-x64_${{ github.ref_name }} --clobber
        working-directory: publish/
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # upload nuget
      - run: dotnet nuget push "./nuget/*.nupkg" --skip-duplicate -k "${NUGET_KEY}"
        env:
          NUGET_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
