name: dotnet-build

on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "master"

jobs:
  build-dotnet:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            5.0.x
            3.1.x
      - run: dotnet build -c Release
      - run: dotnet test -c Release
      - run: dotnet pack -c Release
